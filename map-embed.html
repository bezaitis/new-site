<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.6s ease;
    }

    #stats-strip {
      flex-shrink: 0;
      padding: 12px 16px 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #stats-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    #stats-label {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      transition: color 0.6s ease;
    }

    #stats-label span {
      color: var(--accent);
      font-weight: 600;
    }

    #progress-bar-track {
      flex: 1;
      height: 3px;
      background: var(--track);
      border-radius: 2px;
      overflow: hidden;
      transition: background 0.6s ease;
    }

    #progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: background 0.6s ease;
    }

    #stats-pct {
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: color 0.6s ease;
    }

    #stats-continents {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
    }

    .continent-pill {
      font-size: 13px;
      color: var(--pill-base);
      transition: color 0.6s ease;
    }

    .continent-pill .c-name {
      color: var(--pill-name);
      transition: color 0.6s ease;
    }

    .continent-pill .c-count {
      color: var(--accent);
    }

    .continent-pill .c-sep {
      color: var(--sep);
      margin: 0 8px;
      transition: color 0.6s ease;
    }

    #map-container {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .country {
      fill: var(--land);
      stroke: var(--border);
      stroke-width: 0.4px;
      transition: fill 0.4s ease, stroke 0.4s ease;
    }

    .country.visited {
      fill: var(--accent);
    }

    .country.visited.clickable {
      cursor: pointer;
    }

    .country.visited:hover {
      fill: var(--accent-hover);
    }

    .city-dot {
      fill: var(--bg);
      stroke: var(--accent);
      stroke-width: 1.5px;
      pointer-events: none;
      transition: fill 0.6s ease;
    }

    .city-pulse {
      fill: none;
      stroke: var(--accent);
      stroke-opacity: 0.4;
      stroke-width: 1px;
      pointer-events: none;
    }

    .graticule {
      fill: none;
      stroke: var(--graticule);
      stroke-width: 0.3px;
      transition: stroke 0.6s ease;
    }

    .sphere {
      fill: var(--ocean);
      transition: fill 0.6s ease;
    }

    #tooltip {
      position: fixed;
      background: var(--tooltip-bg);
      color: var(--tooltip-text);
      padding: 6px 12px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      pointer-events: none;
      display: none;
      border: 1px solid rgba(232, 193, 112, 0.3);
      white-space: nowrap;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="stats-strip">
    <div id="stats-top">
      <div id="stats-label"></div>
      <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
      <div id="stats-pct"></div>
    </div>
    <div id="stats-continents"></div>
  </div>
  <div id="map-container"></div>
  <div id="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>
  <script>
    // ── Theme: auto light (6am–8pm) / dark (8pm–6am) ───────────────────────
    const THEMES = {
      dark: {
        '--bg':           '#000000',
        '--ocean':        '#111418',
        '--land':         '#2a2a2a',
        '--border':       '#3d3d3d',
        '--graticule':    '#1a1a1a',
        '--accent':       '#e8c170',
        '--accent-hover': '#f5d68a',
        '--muted':        '#aaa',
        '--track':        '#2a2a2a',
        '--pill-base':    '#666',
        '--pill-name':    '#888',
        '--sep':          '#333',
        '--tooltip-bg':   'rgba(10,10,10,0.9)',
        '--tooltip-text': '#f0f0f0',
      },
      light: {
        '--bg':           '#fafafa',
        '--ocean':        '#c9dff0',
        '--land':         '#ddd8ce',
        '--border':       '#bbb5aa',
        '--graticule':    '#ccc8bf',
        '--accent':       '#b85c1a',
        '--accent-hover': '#d46e28',
        '--muted':        '#666',
        '--track':        '#ccc8bf',
        '--pill-base':    '#888',
        '--pill-name':    '#555',
        '--sep':          '#bbb',
        '--tooltip-bg':   'rgba(245,241,234,0.95)',
        '--tooltip-text': '#222',
      },
    };

    const darkMQ = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme() {
      const vars = darkMQ.matches ? THEMES.dark : THEMES.light;
      const root = document.documentElement;
      for (const [k, v] of Object.entries(vars)) root.style.setProperty(k, v);
    }

    applyTheme();
    darkMQ.addEventListener('change', applyTheme);
  </script>
  <script>
    // Cities to pin (for country-named trips that reference a specific city)
    const cities = [
      { label: 'Chengdu', coords: [104.0665, 30.5728] },
      { label: 'Banff',   coords: [-115.5708, 51.1784] },
      { label: 'London',  coords: [-0.1276, 51.5074] },
    ];

    // Visited countries: ISO numeric code → { label, continent, url? }
    // url is omitted for countries without a trip page
    const visited = {
      // Asia
      764: { label: 'Thailand',    continent: 'Asia',     url: 'https://bezaitis.com/trips/thailand' },
      158: { label: 'Taiwan',      continent: 'Asia',     url: 'https://bezaitis.com/trips/taiwan' },
      156: { label: 'Chengdu',     continent: 'Asia',     url: 'https://bezaitis.com/trips/chengdu' },
      446: { label: 'Macao',       continent: 'Asia',     url: 'https://bezaitis.com/trips/macao' },
      392: { label: 'Japan',       continent: 'Asia',     url: 'https://bezaitis.com/trips/japan' },
      784: { label: 'UAE',         continent: 'Asia',     url: 'https://bezaitis.com/trips/uae' },
      // Europe
      578: { label: 'Norway',      continent: 'Europe',   url: 'https://bezaitis.com/trips/norway' },
      528: { label: 'Netherlands', continent: 'Europe',   url: 'https://bezaitis.com/trips/netherlands' },
      826: { label: 'London',      continent: 'Europe',   url: 'https://bezaitis.com/trips/london' },
      300: { label: 'Greece',      continent: 'Europe',   url: 'https://bezaitis.com/trips/greece' },
      372: { label: 'Ireland',     continent: 'Europe' },
      380: { label: 'Italy',       continent: 'Europe' },
      620: { label: 'Portugal',    continent: 'Europe' },
      276: { label: 'Germany',     continent: 'Europe' },
      724: { label: 'Spain',       continent: 'Europe' },
      // Oceania
       36: { label: 'Australia',   continent: 'Oceania',  url: 'https://bezaitis.com/trips/australia' },
      554: { label: 'New Zealand', continent: 'Oceania',  url: 'https://bezaitis.com/trips/new-zealand' },
      // Africa
      818: { label: 'Egypt',       continent: 'Africa',   url: 'https://bezaitis.com/trips/egypt' },
      // Americas
      124: { label: 'Banff',       continent: 'Americas', url: 'https://bezaitis.com/trips/banff' },
      604: { label: 'Peru',        continent: 'Americas', url: 'https://bezaitis.com/trips/peru' },
      188: { label: 'Costa Rica',  continent: 'Americas' },
      484: { label: 'Mexico',      continent: 'Americas' },
      152: { label: 'Chile',       continent: 'Americas' },
      858: { label: 'Uruguay',     continent: 'Americas' },
    };

    // World country totals per continent (for progress denominators)
    const continentTotals = {
      Asia: 50, Europe: 44, Oceania: 14, Africa: 54, Americas: 35
    };
    const worldTotal = 195;

    // Build stats
    const total = Object.keys(visited).length;
    const pct = ((total / worldTotal) * 100).toFixed(1);

    const byContinent = {};
    for (const entry of Object.values(visited)) {
      byContinent[entry.continent] = (byContinent[entry.continent] || 0) + 1;
    }

    // Render stats strip
    document.getElementById('stats-label').innerHTML =
      `<span>${total}</span> / ${worldTotal} countries visited`;
    document.getElementById('progress-bar-fill').style.width = pct + '%';
    document.getElementById('stats-pct').textContent = pct + '%';

    const continentOrder = ['Asia', 'Europe', 'Oceania', 'Africa', 'Americas'];
    const pillsEl = document.getElementById('stats-continents');
    continentOrder.forEach((c, i) => {
      const count = byContinent[c] || 0;
      const pill = document.createElement('span');
      pill.className = 'continent-pill';
      pill.innerHTML =
        `<span class="c-name">${c}</span> <span class="c-count">${count}</span>` +
        (i < continentOrder.length - 1 ? '<span class="c-sep">·</span>' : '');
      pillsEl.appendChild(pill);
    });

    const tooltip = document.getElementById('tooltip');
    const container = document.getElementById('map-container');
    const statsStrip = document.getElementById('stats-strip');

    function getSize() {
      const w = window.innerWidth;
      const h = window.innerHeight - statsStrip.offsetHeight;
      return [w, Math.max(h, 100)];
    }

    const svg = d3.select('#map-container')
      .append('svg')
      .attr('preserveAspectRatio', 'xMidYMid meet');

    const g = svg.append('g');

    let projection, pathGen, countriesFeature, cityGroups;

    function setupProjection(width, height) {
      projection = d3.geoNaturalEarth1()
        .fitSize([width, height], { type: 'Sphere' });
      pathGen = d3.geoPath().projection(projection);
    }

    function redraw() {
      const [w, h] = getSize();
      setupProjection(w, h);
      svg.attr('viewBox', `0 0 ${w} ${h}`);
      g.selectAll('path').attr('d', pathGen);
      if (cityGroups) {
        cityGroups.attr('transform', d => {
          const [x, y] = projection(d.coords);
          return `translate(${x},${y})`;
        });
      }
    }

    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
      countriesFeature = topojson.feature(world, world.objects.countries);

      const [w, h] = getSize();
      setupProjection(w, h);
      svg.attr('viewBox', `0 0 ${w} ${h}`);

      // Ocean sphere
      g.append('path')
        .datum({ type: 'Sphere' })
        .attr('class', 'sphere')
        .attr('d', pathGen);

      // Graticule
      g.append('path')
        .datum(d3.geoGraticule()())
        .attr('class', 'graticule')
        .attr('d', pathGen);

      // Countries
      g.selectAll('.country')
        .data(countriesFeature.features)
        .join('path')
        .attr('class', d => {
          const id = +d.id;
          const info = visited[id];
          if (!info) return 'country';
          return info.url ? 'country visited clickable' : 'country visited';
        })
        .attr('d', pathGen)
        .on('mousemove', function(event, d) {
          const id = +d.id;
          const info = visited[id];
          if (!info) return;
          tooltip.style.display = 'block';
          tooltip.textContent = info.label;
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top  = (event.clientY - 28) + 'px';
        })
        .on('mouseleave', function(event, d) {
          const id = +d.id;
          if (!visited[id]) return;
          tooltip.style.display = 'none';
        })
        .on('click', function(event, d) {
          const id = +d.id;
          const info = visited[id];
          if (!info || !info.url) return;
          window.open(info.url, '_blank', 'noopener,noreferrer');
        });

      // City markers — outer pulse ring + inner dot
      cityGroups = g.selectAll('.city-group')
        .data(cities)
        .join('g')
        .attr('class', 'city-group');

      cityGroups.append('circle')
        .attr('class', 'city-pulse')
        .attr('r', 5.5);

      cityGroups.append('circle')
        .attr('class', 'city-dot')
        .attr('r', 2.8);

      cityGroups.attr('transform', d => {
        const [x, y] = projection(d.coords);
        return `translate(${x},${y})`;
      });

      // Redraw on resize — both ResizeObserver and window resize for iframe compat
      window.addEventListener('resize', redraw);
      const ro = new ResizeObserver(redraw);
      ro.observe(document.documentElement);
    });
  </script>
</body>
</html>
